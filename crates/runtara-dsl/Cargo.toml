[package]
name = "runtara-dsl"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "DSL for agent metadata definitions in runtara workflows"
keywords = ["durable", "workflow", "dsl", "agents"]
categories = ["development-tools"]

[features]
default = ["json-schema"]
# `JsonSchema` derives drive the JSON Schema export pipeline at
# `crates/runtara-server/build.rs`. Default-on so all current consumers
# keep working; optional so the WASM build for `runtara-report-dsl` (Phase
# 2 of the reports refactor) can drop schemars 0.8 from its tree.
json-schema = ["dep:schemars"]
utoipa = ["dep:utoipa"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = { version = "1", optional = true }
utoipa = { version = "5.3", optional = true }
