[package]
name = "runtara-workflow-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Workflow runtime component for direct-emitted runtara workflow Wasm"
keywords = ["workflow", "runtime", "wasm", "component"]
categories = ["development-tools", "wasm"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["runtara-sdk/native"]
wasi = ["runtara-sdk/wasi"]

[dependencies]
runtara-sdk = { path = "../runtara-sdk", version = "8.5", default-features = false, features = ["http"] }
wit-bindgen = "0.58"
