[package]
name = "runtara-workflow-validation-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Browser WASM bindings for runtara workflow validation"
keywords = ["workflow", "validation", "wasm"]
categories = ["development-tools", "wasm"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# The browser validator no longer embeds the agent set — the host page
# pushes it in via `initAgentCatalog(json)` after a one-shot
# `GET /api/runtime/agents` on app boot. That's why we don't depend on
# `runtara-agents` anymore.
runtara-dsl = { path = "../runtara-dsl", version = "8.1" }
runtara-workflows = { path = "../runtara-workflows", version = "8.1", default-features = false, features = ["wasm-js"] }
serde = { workspace = true }
serde_json = { workspace = true }
wasm-bindgen = "0.2"
