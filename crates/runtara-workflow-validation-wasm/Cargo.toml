[package]
name = "runtara-workflow-validation-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Browser WASM bindings for runtara workflow validation"
keywords = ["workflow", "validation", "wasm"]
categories = ["development-tools", "wasm"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
runtara-agents = { path = "../runtara-agents", version = "4.14", default-features = false, features = ["integrations", "wasm-js"] }
runtara-dsl = { path = "../runtara-dsl", version = "4.14" }
runtara-workflows = { path = "../runtara-workflows", version = "4.14", default-features = false, features = ["integrations", "wasm-js"] }
serde = { workspace = true }
serde_json = { workspace = true }
wasm-bindgen = "0.2"
