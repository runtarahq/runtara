[package]
name = "runtara-sdk"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "High-level SDK for building durable workflows with runtara"
keywords = ["durable", "workflow", "sdk", "checkpoint"]
categories = ["development-tools"]

[features]
default = ["http", "embedded"]

# Embedded mode - direct persistence layer access
# Note: This feature is only available when building from source (runtara-core is not published)
embedded = ["dep:runtara-core", "dep:tokio"]

# HTTP-based communication with runtara-core
# Uses runtara-http for HTTP calls. For WASM transition and simpler deployments.
http = ["dep:runtara-http", "dep:percent-encoding"]

# WASI target - HTTP-based communication (wasm32-wasip2)
# Uses wasi-http for checkpointing, blocking I/O for sequential workflows
wasi = []

# Browser/Node.js target - JS interop via wasm-bindgen (wasm32-unknown-unknown)
# Uses fetch API for HTTP, localStorage/IndexedDB for local state
wasm-js = []

[dependencies]
# Core (optional, for embedded mode)
runtara-core = { path = "../runtara-core", version = "4.9", optional = true }

# HTTP client (optional, for http mode)
runtara-http = { workspace = true, optional = true }
percent-encoding = { version = "2", optional = true }

# Macros
runtara-sdk-macros = { path = "../runtara-sdk-macros", version = "4.9" }

# Async runtime (optional, for embedded mode - bridge to async Persistence trait)
tokio = { version = "1", features = ["rt", "time"], optional = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
base64 = "0.22"

# Error handling
thiserror = "2"

# Observability
tracing = "0.1"

# Time
chrono = { workspace = true }

# Global registry
once_cell = "1.20"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tokio-util = "0.7"
futures = "0.3"
async-trait = "0.1"

# For embedded heartbeat tests
runtara-core = { path = "../runtara-core", version = "4.9" }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
