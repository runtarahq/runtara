[package]
name = "runtara-sdk"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "High-level SDK for building durable workflows with runtara"
keywords = ["durable", "workflow", "sdk", "checkpoint"]
categories = ["asynchronous", "development-tools"]

[features]
default = ["http", "embedded"]

# Embedded mode - direct persistence layer access
# Note: This feature is only available when building from source (runtara-core is not published)
embedded = ["dep:runtara-core"]

# HTTP-based communication with runtara-core
# Uses reqwest for HTTP calls. For WASM transition and simpler deployments.
http = ["dep:reqwest", "dep:percent-encoding"]

# WASI target - HTTP-based communication (wasm32-wasip2)
# Uses wasi-http for checkpointing, blocking I/O for sequential workflows
wasi = []

# Browser/Node.js target - JS interop via wasm-bindgen (wasm32-unknown-unknown)
# Uses fetch API for HTTP, localStorage/IndexedDB for local state
wasm-js = []

[dependencies]
# Core (optional, for embedded mode)
runtara-core = { path = "../runtara-core", version = "1.0", optional = true }

# HTTP client (optional, for http mode)
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false, optional = true }
percent-encoding = { version = "2", optional = true }

# Macros
runtara-sdk-macros = { path = "../runtara-sdk-macros", version = "1.0" }

# Async runtime
tokio = { version = "1", features = ["sync", "time"] }
tokio-util = "0.7"
async-trait = "0.1"

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
base64 = "0.22"

# Error handling
thiserror = "2"

# Observability
tracing = "0.1"

# Time
chrono = { workspace = true }

# Global registry
once_cell = "1.20"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
futures = "0.3"
tokio-util = "0.7"

# For embedded heartbeat tests
runtara-core = { path = "../runtara-core", version = "1.0" }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
