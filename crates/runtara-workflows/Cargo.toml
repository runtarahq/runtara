[package]
name = "runtara-workflows"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Workflow compilation library for runtara DSL"
keywords = ["durable", "workflow", "compiler", "dsl"]
categories = ["development-tools"]

[features]
default = ["compiler", "integrations", "native-agents"]
compiler = ["builtin-agent-registry", "dep:runtara-ai", "dep:proc-macro2", "dep:quote", "dep:tracing-subscriber"]
integrations = ["runtara-agents?/integrations"]
native-agents = ["runtara-agents?/native"]
wasm-js = ["runtara-agents?/wasm-js"]
builtin-agent-registry = ["dep:runtara-agents"]

[dependencies]
runtara-ai = { path = "../runtara-ai", version = "4.8", optional = true }
runtara-agents = { path = "../runtara-agents", version = "4.8", default-features = false, optional = true }
runtara-dsl = { path = "../runtara-dsl", version = "4.8" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
proc-macro2 = { version = "1.0", optional = true }
quote = { version = "1.0", optional = true }
minijinja = "2.5"

[[bin]]
name = "runtara-compile"
path = "src/bin/compile.rs"
required-features = ["compiler"]

[dev-dependencies]
tempfile = "3"
syn = { version = "2.0", features = ["full", "parsing"] }
