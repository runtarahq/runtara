[package]
name = "runtara-workflows"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Workflow compilation library for runtara DSL"
keywords = ["durable", "workflow", "compiler", "dsl"]
categories = ["development-tools"]

[features]
default = ["compiler", "integrations", "native-agents"]
compiler = []
integrations = ["runtara-agents/integrations"]
native-agents = ["runtara-agents/native"]
wasm-js = ["runtara-agents/wasm-js"]

[dependencies]
runtara-ai = { path = "../runtara-ai", version = "4.10" }
runtara-agents = { path = "../runtara-agents", version = "4.10", default-features = false }
runtara-dsl = { path = "../runtara-dsl", version = "4.10" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
proc-macro2 = "1.0"
quote = "1.0"
minijinja = "2.5"

[[bin]]
name = "runtara-compile"
path = "src/bin/compile.rs"
required-features = ["compiler"]

[dev-dependencies]
tempfile = "3"
syn = { version = "2.0", features = ["full", "parsing"] }
