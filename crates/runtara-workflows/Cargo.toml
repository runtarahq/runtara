[package]
name = "runtara-workflows"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Workflow compilation library for runtara DSL"
keywords = ["durable", "workflow", "compiler", "dsl"]
categories = ["development-tools"]

[features]
default = ["compiler", "native-agents"]
compiler = ["dep:wasm-encoder"]
native-agents = ["runtara-agents/native"]
wasm-js = ["runtara-agents/wasm-js"]

[dependencies]
runtara-agents = { path = "../runtara-agents", version = "7.2", default-features = false }
runtara-dsl = { path = "../runtara-dsl", version = "7.2" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
proc-macro2 = "1.0"
quote = "1.0"
minijinja = "2.5"
wasm-encoder = { version = "0.246", optional = true }

[[bin]]
name = "runtara-compile"
path = "src/bin/compile.rs"
required-features = ["compiler"]

[[bin]]
name = "runtara-direct-wasm-poc"
path = "src/bin/direct_wasm_poc.rs"
required-features = ["compiler"]

[dev-dependencies]
tempfile = "3"
syn = { version = "2.0", features = ["full", "parsing"] }
base64 = { workspace = true }
wasmparser = "0.246"
