[package]
name = "runtara-workflows"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Workflow compilation library for runtara DSL"
keywords = ["durable", "workflow", "compiler", "dsl"]
categories = ["development-tools"]

[features]
default = ["compiler", "native-agents"]
compiler = [
    "dep:runtara-workflow-wit",
    "dep:wasm-encoder",
    "dep:wit-component",
    "dep:wit-parser",
    "dep:wac-parser",
    "dep:wac-resolver",
    "dep:wac-graph",
    "dep:wasmparser",
    # AgentCatalog::from_meta_dir for the runtara-compile CLI.
    "runtara-dsl/fs",
]
native-agents = ["runtara-agents/native"]
wasm-js = ["runtara-agents/wasm-js"]
direct-wasm-integration-tests = []

[[test]]
name = "direct_wasm_execute"
path = "tests/direct_wasm_execute.rs"
required-features = ["direct-wasm-integration-tests"]

# Standalone compiler CLI: workflow JSON (+ --child graphs) → composed
# workflow.wasm, no server or database. See src/bin/compile.rs.
[[bin]]
name = "runtara-compile"
path = "src/bin/compile.rs"
required-features = ["compiler"]

[dependencies]
runtara-agents = { path = "../runtara-agents", version = "8.5", default-features = false }
runtara-dsl = { path = "../runtara-dsl", version = "8.5" }
runtara-workflow-wit = { path = "../runtara-workflow-wit", version = "8.5", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
minijinja = "2.5"
wasm-encoder = { version = "0.247", optional = true }
wit-component = { version = "0.247", optional = true }
wit-parser = { version = "0.247", optional = true }
wac-parser = { version = "0.10", optional = true }
wac-resolver = { version = "0.10", default-features = false, optional = true }
wac-graph = { version = "0.10", optional = true }
wasmparser = { version = "0.247", optional = true }

[dev-dependencies]
async-trait = "0.1"
tempfile = "3"
base64 = { workspace = true }
wasmparser = "0.247"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
runtara-workflow-stdlib = { path = "../runtara-workflow-stdlib", version = "8.5", default-features = false }
# Embedded-vs-CLI A/B in tests/direct_wasm_execute.rs: the composed component
# must behave identically under the in-process WorkflowExecutor.
runtara-component-host = { path = "../runtara-component-host" }
tokio = { version = "1", features = ["rt-multi-thread", "time", "macros"] }
