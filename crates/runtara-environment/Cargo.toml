[package]
name = "runtara-environment"
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true
description = "Environment server for runtara - image registry, OCI runner, and instance management"
keywords = ["durable", "workflow", "oci", "container"]
categories = ["asynchronous", "development-tools"]

[lib]
name = "runtara_environment"
path = "src/lib.rs"

[features]
db-integration-tests = []

[[bin]]
name = "runtara-environment"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls-ring-webpki", "postgres", "uuid", "chrono", "macros", "migrate"] }

# Core persistence layer (for shared database access)
runtara-core = { path = "../runtara-core", version = "8.6" }

# Embedded wasmtime workflow execution (EmbeddedWasmRunner)
runtara-component-host = { path = "../runtara-component-host", version = "8.6" }

# DSL types for agent metadata (list_agents, get_capability)
runtara-dsl = { path = "../runtara-dsl", version = "8.6" }

# Configuration
dotenvy = "0.15"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
thiserror = "2"
anyhow = "1"

# Logging/tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
sha2.workspace = true
nix = { version = "0.29", features = ["user", "signal"] }

# HTTP server
axum = { version = "0.8", features = ["multipart"] }
base64 = "0.22"
percent-encoding = "2"

# Async trait
async-trait = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["test-util", "macros", "rt-multi-thread"] }
tempfile = "3"
runtara-workflows = { path = "../runtara-workflows", version = "8.6" }
futures = "0.3"
# Embedded-runner tests author minimal wasi:cli/run components in WAT.
wat = "1"
# Testcontainers for automatic PostgreSQL setup in tests
testcontainers = "0.27"
testcontainers-modules = { version = "0.15", features = ["postgres"] }

[[test]]
name = "container_registry_test"
path = "tests/container_registry_test.rs"
required-features = ["db-integration-tests"]

[[test]]
name = "db_cleanup_worker_test"
path = "tests/db_cleanup_worker_test.rs"
required-features = ["db-integration-tests"]

[[test]]
name = "db_test"
path = "tests/db_test.rs"
required-features = ["db-integration-tests"]

[[test]]
name = "handlers_test"
path = "tests/handlers_test.rs"
required-features = ["db-integration-tests"]

[[test]]
name = "heartbeat_monitor_test"
path = "tests/heartbeat_monitor_test.rs"
required-features = ["db-integration-tests"]

[[test]]
name = "image_registry_test"
path = "tests/image_registry_test.rs"
required-features = ["db-integration-tests"]

[[test]]
name = "wake_scheduler_test"
path = "tests/wake_scheduler_test.rs"
required-features = ["db-integration-tests"]
