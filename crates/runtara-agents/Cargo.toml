[package]
name = "runtara-agents"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Native agent implementations for runtara workflows"
keywords = ["durable", "workflow", "agents"]
categories = ["development-tools"]

[lib]
name = "runtara_agents"
path = "src/lib.rs"
crate-type = ["rlib"]

[features]
default = ["native"]

# Native platform - full agent support including C-dependent agents (SFTP, XLSX, Compression)
native = [
    "dep:ssh2",
    "dep:openssl",
    "dep:calamine",
    "dep:zip",
    "runtara-http/native",
]

# WASI target (wasm32-wasip2) - HTTP via wasi-http, no SFTP
wasi = ["runtara-http/wasi"]

# Browser/Node.js target - HTTP via fetch, no SFTP
wasm-js = ["runtara-http/wasm-js"]

[dependencies]
runtara-dsl = { path = "../runtara-dsl", version = "8.3" }
runtara-agent-macro = { path = "../runtara-agent-macro", version = "8.3" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
base64 = "0.22"
strum = { version = "0.26", features = ["derive"] }
# HTTP abstraction used by the standalone S3 client (s3_client.rs)
runtara-http = { workspace = true, default-features = false }
# Native-only agents — C deps that don't compile to WASM
ssh2 = { version = "0.9", optional = true }
# Vendored OpenSSL for musl static builds (required by ssh2/libssh2-sys)
openssl = { workspace = true, optional = true }
# ZIP archive support (compression agent)
zip = { version = "2.2", optional = true }
# Spreadsheet parsing (XLSX, XLS, XLSB, ODS) (xlsx agent)
calamine = { version = "0.26", optional = true }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros"] }
wiremock = "0.6"
serial_test = "3"
