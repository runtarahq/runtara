[package]
name = "runtara-agent-utils"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Utility agent — math, dates, strings, country codes — as a WebAssembly component"
keywords = ["wasm", "component", "agent", "utils"]
categories = ["wasm"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen-rt = { version = "0.44", features = ["bitflags"] }
serde = { workspace = true }
serde_json = { workspace = true }
rand = "0.8"
# Capability metadata stays beside the code: `#[capability_input]`,
# `#[capability]` emit `&'static CapabilityMeta` / `&'static InputTypeMeta`
# items, and the host-only `agent_info()` fn collects them into a
# `runtara_dsl::agent_meta::AgentInfo`. A workspace `emit-meta` binary then
# serializes that to `meta.json` next to the `.wasm` — the JSON is a build
# artifact, never hand-edited.
runtara-agent-macro = { path = "../../runtara-agent-macro" }
runtara-dsl = { path = "../../runtara-dsl", default-features = false }

[package.metadata.component]
package = "runtara:agent-utils"

[package.metadata.component.target]
path = "wit"
world = "agent"

# The per-agent `wit/agent.wit` (generated by build.rs) references
# `runtara:agent/types@0.3.0` for the shared connection-info / error-info
# records. Point cargo-component at the shared package so the `use` resolves.
[package.metadata.component.target.dependencies]
"runtara:agent" = { path = "../../runtara-agent-wit/wit" }
