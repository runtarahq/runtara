[package]
name = "runtara-agent-sqs"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "AWS SQS integration agent — WebAssembly Component"
keywords = ["wasm", "component", "agent", "sqs", "aws"]
categories = ["wasm", "web-programming::http-client"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen = "0.58"
serde = { workspace = true }
serde_json = { workspace = true }
# runtara-http compiles host-side (ureq) and wasm-side (wasi); the wasm build
# routes through the proxy via the `X-Runtara-Connection-Id` header so AWS
# credentials and SigV4 signing never enter the .wasm binary. The agent names
# the AWS service (`sqs`) via the `X-Runtara-Aws-Service` header so a single
# generic `aws_credentials` connection can serve it — no per-service
# connection type. See docs/sqs-agent-plan.md.
runtara-agent-macro = { path = "../../runtara-agent-macro" }
runtara-dsl = { path = "../../runtara-dsl", default-features = false }



[target.'cfg(not(target_family = "wasm"))'.dependencies]
runtara-http = { path = "../../runtara-http", default-features = false, features = ["native"] }

[target.'cfg(target_family = "wasm")'.dependencies]
runtara-http = { path = "../../runtara-http", default-features = false, features = ["wasi"] }
