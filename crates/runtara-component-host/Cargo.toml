[package]
name = "runtara-component-host"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Embedded wasmtime host for loading and invoking runtara agent components"
keywords = ["wasm", "component-model", "wasmtime", "agent"]
categories = ["wasm"]

[features]
component-integration-tests = []

[[test]]
name = "capability_fixtures"
path = "tests/capability_fixtures.rs"
required-features = ["component-integration-tests"]

[[test]]
name = "crypto_agent"
path = "tests/crypto_agent.rs"
required-features = ["component-integration-tests"]

[[test]]
name = "dispatcher"
path = "tests/dispatcher.rs"
required-features = ["component-integration-tests"]

[[test]]
name = "sqs_agent"
path = "tests/sqs_agent.rs"
required-features = ["component-integration-tests"]

[dependencies]
runtara-agent-wit = { path = "../runtara-agent-wit" }
# Used as the canonical AgentInfo shape for sidecar meta.json files. The host
# parses each agent's meta.json into AgentInfo and serves it back to the
# server unchanged.
runtara-dsl = { path = "../runtara-dsl" }
# Canonical LIFECYCLE_INTERFACE_NAME — one source of truth for the invoke
# export name shared with the compiler.
runtara-workflow-wit = { path = "../runtara-workflow-wit" }

# Embedded wasmtime engine + WASI Preview 2 support.
# wasmtime crate version is independent of the wasmtime CLI version pinned in
# scripts/build-bundle.sh — the CLI is a separate process used by WasmRunner
# and goes away in Phase 6.
wasmtime = { version = "46", default-features = false, features = [
    "std",
    "anyhow",
    "runtime",
    "component-model",
    # CM-async (WASIp3): concurrent host imports (func_wrap_concurrent), the
    # in-store event loop, and the async-typed agent/lifecycle ABI v2. See
    # docs/wasip3-parallelism.md.
    "component-model-async",
    "async",
    "cranelift",
    "parallel-compilation",
    "backtrace",
    "addr2line",
    "demangle",
    # On-disk compiled-artifact cache so a server restart doesn't re-pay the
    # Cranelift compile for every deployed image (see build_engine).
    "cache",
] }
wasmtime-wasi = "46"
wasmtime-wasi-http = "46"

# Plumbing
anyhow = "1"
# host-io concurrent HTTP hop (docs/wasip3-parallelism.md route (b)). Same
# hyper family wasmtime-wasi-http already pulls in.
hyper = { version = "1", features = ["client", "http1"] }
hyper-util = { version = "0.1", features = ["client", "client-legacy", "http1", "tokio"] }
http-body-util = "0.1"
bytes = "1"
base64 = { workspace = true }
# Dyn-compatible async for the RuntimeHost trait (implemented in
# runtara-environment; this crate stays persistence-agnostic).
async-trait = "0.1"
tracing = "0.1"
serde = { workspace = true }
serde_json = { workspace = true }
http = "1"
# Already a transitive dep via wasmtime-wasi; declared for the workflow
# executor's select!/sleep/spawn_blocking and the component-cache mutex.
tokio = { version = "1", features = ["macros", "rt", "time", "sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tempfile = "3"
# Tests author minimal components in WAT; the `wat` feature lets
# `Component::from_file` parse text-format components.
wasmtime = { version = "46", default-features = false, features = ["wat"] }
# Tests build their own bundle (.wasm + sidecar meta.json) at runtime by
# calling each agent crate's host-only `agent_info()` and serializing the
# resulting `AgentInfo` to JSON next to the freshly-built `.wasm`.
runtara-agent-crypto = { path = "../agents/runtara-agent-crypto" }
