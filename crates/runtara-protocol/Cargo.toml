[package]
name = "runtara-protocol"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Wire protocol layer for runtara (Protobuf message types and framing)"
keywords = ["durable", "workflow", "protocol", "protobuf"]
categories = ["network-programming"]

[dependencies]
prost = "0.13"
bytes = "1.11"
tokio = { version = "1", features = ["io-util", "sync", "macros"] }
thiserror = "2"
tracing = "0.1"

[build-dependencies]
prost-build = "0.13"
