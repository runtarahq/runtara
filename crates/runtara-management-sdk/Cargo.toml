[package]
name = "runtara-management-sdk"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "SDK for managing runtara instances (start, stop, signals, images)"
keywords = ["durable", "workflow", "management", "sdk"]
categories = ["asynchronous", "development-tools"]

[dependencies]
tokio = { version = "1", features = ["sync", "time", "rt-multi-thread", "macros"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = "2"
tracing = "0.1"
chrono = { workspace = true }
reqwest = { version = "0.12", features = ["json", "multipart", "rustls-tls"], default-features = false }
percent-encoding = "2"
base64 = "0.22"

[[bin]]
name = "runtara-ctl"
path = "src/bin/runtara-ctl.rs"

[[bin]]
name = "e2e-parallel-status-test"
path = "src/bin/e2e-parallel-status-test.rs"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
