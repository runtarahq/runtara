[package]
name = "runtara-server"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Complete HTTP API server for runtara — workflows, connections, channels, workers"
keywords = ["durable", "workflow", "server", "runtime"]
categories = ["web-programming"]
# Multiple binaries (server + dump_openapi codegen helper). Pin the
# default so `cargo run -p runtara-server` resolves without `--bin`.
default-run = "runtara-server"

[lib]
name = "runtara_server"
path = "src/lib.rs"

[[bin]]
name = "runtara-server"
path = "src/main.rs"

[[bin]]
name = "dump_openapi"
path = "src/bin/dump_openapi.rs"

[features]
# Embed the pre-built frontend (frontend/dist/) and serve it at the UI mount prefix.
# Run `npm run build` inside ./frontend before building with this feature enabled.
embed-ui = ["dep:rust-embed"]
db-integration-tests = []

[[test]]
name = "invocation_cleanup_test"
path = "tests/invocation_cleanup_test.rs"
required-features = ["db-integration-tests"]

[dependencies]
# Runtara crates
runtara-workflows = { path = "../runtara-workflows" }
runtara-management-sdk = { path = "../runtara-management-sdk" }
runtara-dsl = { path = "../runtara-dsl", features = ["utoipa"] }
runtara-agents = { path = "../runtara-agents", default-features = false, features = ["native"] }
runtara-core = { path = "../runtara-core", features = ["server"] }
runtara-environment = { path = "../runtara-environment" }
runtara-object-store = { path = "../runtara-object-store" }
runtara-text-parser = { path = "../runtara-text-parser" }
runtara-connections = { path = "../runtara-connections", features = ["utoipa"] }
runtara-ai = { path = "../runtara-ai" }
runtara-report-dsl = { path = "../runtara-report-dsl", features = ["utoipa"] }
runtara-component-host = { path = "../runtara-component-host" }

# Database
sqlx = { version = "0.8.6", features = [
    "runtime-tokio",
    "tls-native-tls",
    "postgres",
    "uuid",
    "chrono",
    "json",
    "macros",
    "migrate",
    "rust_decimal",
] }

# HTTP/API
axum = { version = "0.8", features = ["multipart"] }
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }
http-body-util = "0.1"
bytes = "1"
utoipa = { version = "5", features = ["axum_extras", "chrono", "uuid"] }

# Optional: embedded UI assets (`embed-ui` feature)
# Debug builds read from disk (no `debug-embed`): `npm run build` changes are picked up
# on the next HTTP request without a Rust rebuild. Release builds embed.
rust-embed = { version = "8", features = ["mime-guess"], optional = true }

# Async runtime
tokio = { version = "1", features = ["full"] }
async-stream = "0.3"
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
regex = "1.11"
num_cpus = "1.16"
sysinfo = "0.32"
dashmap = "6.1"
# Bounded, self-evicting, single-flight cache for per-connection object-model
# PgPools (see api/repositories/object_model.rs).
moka = { version = "0.12", features = ["future"] }
jsonschema = "0.26"
croner = "2"

# Redis/Valkey
# tokio-rustls-comp enables `rediss://` TLS URLs; tls-rustls-insecure allows the
# `#insecure` URL fragment (skip server-cert verification, local testing only).
redis = { version = "0.27", features = [
    "tokio-comp",
    "connection-manager",
    "tokio-rustls-comp",
    "tls-rustls-insecure",
] }

# JWT authentication
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
async-trait = "0.1"

# Error handling
thiserror = "1.0"
anyhow = "1"

# Misc utilities
base64 = { workspace = true }
csv = "1.3"
sha2 = { workspace = true }
hmac = { workspace = true }
hex = "0.4"
rand = "0.8"
url = "2"
urlencoding = "2"

# MCP (Model Context Protocol) server
rmcp = { version = "1.7", features = ["server", "transport-streamable-http-server"] }
schemars = "1"
reqwest = { version = "0.12", features = ["json"] }

# OpenTelemetry integration
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-opentelemetry = "0.33"
opentelemetry = { version = "0.32", features = ["trace", "metrics", "logs"] }
opentelemetry_sdk = { version = "0.32", features = [
    "rt-tokio",
    "trace",
    "metrics",
    "logs",
] }
opentelemetry-otlp = { version = "0.32", features = [
    "grpc-tonic",
    "trace",
    "metrics",
    "logs",
] }
opentelemetry-semantic-conventions = { version = "0.32", features = [
    "semconv_experimental",
] }
opentelemetry-appender-tracing = "0.32"

# Environment
dotenvy = "0.15"

[build-dependencies]
runtara-dsl = { path = "../runtara-dsl" }
serde_json = "1.0"

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["full", "test-util"] }
rsa = { version = "0.9", features = ["sha2"] }
testcontainers = "0.27"
testcontainers-modules = { version = "0.15", features = ["postgres"] }
insta = { version = "1", features = ["json", "filters"] }
proptest = "1"
