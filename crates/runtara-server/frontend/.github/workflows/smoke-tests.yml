name: Smoke Tests

on:
  # Run on demand
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

  # Run on schedule (e.g., every day at 6 AM UTC)
  schedule:
    - cron: '0 6 * * *'

  # Run on push to main (optional - remove if too frequent)
  # push:
  #   branches: [main]

env:
  VITE_RUNTARA_API_BASE_URL: ${{ vars.VITE_RUNTARA_API_BASE_URL }}

jobs:
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build
        env:
          VITE_RUNTARA_API_BASE_URL: ${{ env.VITE_RUNTARA_API_BASE_URL }}
          # Add other required VITE_ variables from secrets
          VITE_OIDC_AUTHORITY: ${{ secrets.VITE_OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ secrets.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_AUDIENCE: ${{ secrets.VITE_OIDC_AUDIENCE }}

      - name: Start preview server
        run: |
          npm run preview -- --port 4173 &
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Run smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          # auth.setup.ts reads these at test time (not just build time) to
          # construct the Auth0 token request and the localStorage key.
          VITE_OIDC_AUTHORITY: ${{ secrets.VITE_OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ secrets.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_AUDIENCE: ${{ secrets.VITE_OIDC_AUDIENCE }}
          TEST_APP_CLIENT_ID: ${{ secrets.TEST_APP_CLIENT_ID }}
          TEST_APP_CLIENT_SECRET: ${{ secrets.TEST_APP_CLIENT_SECRET }}
          TEST_ORG_ID: ${{ secrets.TEST_ORG_ID }}
          CI: 'true'
        run: npx playwright test --project=smoke

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: |
            e2e-results/
            e2e-report/
          retention-days: 7

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report
          path: e2e-report/
          retention-days: 30
