[package]
name = "runtara-http"
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true
description = "HTTP client abstraction for runtara — native (ureq) and WASI backends"
keywords = ["http", "wasi", "client"]
categories = ["web-programming::http-client"]

[dependencies]
base64 = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = "2"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
ureq = { version = "2", features = ["json", "tls"] }

[target.'cfg(all(target_family = "wasm", target_os = "wasi"))'.dependencies]
# Pin to wasi 0.14.2 which uses wasip2 1.0.1 (WASI 0.2.4) matching Rust's std
wasi = { version = "=0.14.2", features = ["std"] }
