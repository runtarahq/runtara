[package]
name = "runtara-http"
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true
description = "HTTP client abstraction for runtara — native (ureq) and WASI backends"
keywords = ["http", "wasi", "client"]
categories = ["web-programming::http-client"]

[features]
# No default backend — every consumer must opt in to exactly one. This is
# deliberate: a cfg-target-gated `ureq` dep would land in every transitive
# consumer's Cargo.lock (rustls, ring, icu_*, …) even for builds that
# never compile it. Feature-gating keeps wasm consumers' lockfiles clean.
default = []

# Native blocking HTTP via ureq (any non-wasm target).
native = ["dep:ureq"]

# WASI HTTP via wasi:http/outgoing-handler (wasm32-wasip1/wasip2).
wasi = ["dep:wasi", "dep:wit-bindgen"]

# Browser/Node JS placeholder backend — link-only, calls fail at runtime.
wasm-js = []

[dependencies]
base64 = { workspace = true }
# host-io transport bindings (route (b), docs/wasip3-parallelism.md §3.6).
wit-bindgen = { version = "0.58", optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = "2"

ureq = { version = "2", features = ["json", "tls"], optional = true }

# Pin to wasi 0.14.1 which targets WASI 0.2.3. This matches the WASI version
# baked into the wit-component preview1 adapter that cargo-component 0.21.1
# ships (wasi-preview1-component-adapter-provider 29.0.1 → 0.2.3). If we let
# the resolver pick newer wasi crates (0.14.2+ → 0.2.4, 0.14.7+ → 0.2.9), the
# composed workflow.wasm ends up with shims at one version and direct imports
# at another. wasmtime's component linker treats each `wasi:*/*/types@X.Y.Z`
# as a distinct nominal type — semver-compat resolution doesn't bridge across
# 0.2.x minors for resource imports introduced by the adapter — so a call
# through the adapter's shim traps with "resource implementation is missing".
# Single-version pinning is the only thing that keeps the composed wasm
# uniformly resolvable. crates/runtara-agent-wit/wit/deps.toml and the world
# `include wasi:cli/command@0.2.3` in components codegen are already at 0.2.3.
wasi = { version = "=0.14.1", features = ["std"], optional = true }
