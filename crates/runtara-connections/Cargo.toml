[package]
name = "runtara-connections"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Connection management for runtara — CRUD, OAuth2, rate limiting"
publish = false
keywords = ["durable", "workflow", "connections", "oauth"]
categories = ["web-programming"]

[features]
default = []
utoipa = ["dep:utoipa"]

[dependencies]
# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-native-tls", "postgres", "uuid", "chrono", "json"] }

# HTTP
axum = "0.8"

# Redis
redis = { version = "0.27", features = ["tokio-comp", "aio"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
rand = "0.9"
hex = "0.4"
reqwest = { version = "0.12", features = ["json"] }
urlencoding = "2"

# Error handling
thiserror = "2"

# Logging
tracing = "0.1"

# Connection type metadata
runtara-dsl = { path = "../runtara-dsl" }

# OpenAPI (optional)
utoipa = { version = "5", optional = true }
