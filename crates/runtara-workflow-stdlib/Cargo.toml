[package]
name = "runtara-workflow-stdlib"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Standard library for runtara workflow binaries - combines agents and runtime"
keywords = ["durable", "workflow", "stdlib", "agents"]
categories = ["development-tools"]

[lib]
name = "runtara_workflow_stdlib"
path = "src/lib.rs"
crate-type = ["rlib"]

[features]
default = ["native"]

# Native platform — uses the native SDK backend (blocking ureq HTTP).
native = []

# WASI target (wasm32-wasip1/wasip2) — wasi-http transport.
wasi = ["runtara-sdk/wasi"]

# Browser/Node.js target — JS HTTP interop.
wasm-js = ["runtara-sdk/wasm-js"]

# OpenTelemetry (native only) — requires tokio for OTEL batch exporter flush.
telemetry = [
    "native",
    "dep:tokio",
    "opentelemetry",
    "opentelemetry_sdk",
    "opentelemetry-otlp",
    "tracing-opentelemetry",
    "opentelemetry-appender-tracing",
]

[dependencies]
# Core dependency: the SDK protocol wrapper. Agent dispatch happens via
# per-agent WIT bindings injected by `wac compose`, not by linking the
# `runtara-agents` crate into the workflow.
runtara-sdk = { path = "../runtara-sdk", version = "7.0", default-features = false, features = ["http"] }

# AI/LLM helpers consumed directly by codegen for AI Agent steps
# (CompletionModel, ToolDefinition, Message, provider dispatch). Re-exported
# below as `ai` so generated code can write `runtara_workflow_stdlib::ai::*`.
# TODO: migrate AI Agent codegen to dispatch through the `ai-tools` WIT agent
# and drop this dep again (would shrink workflow.wasm).
runtara-ai = { path = "../runtara-ai", version = "7.0" }

# Re-exported for workflows
serde = { workspace = true }
serde_json = { workspace = true }

# Tokio kept optional for telemetry OTEL batch exporter (needs async runtime for flush)
tokio = { version = "1", features = ["full"], optional = true }

# HTTP client for connection fetching (native only)
runtara-http = { workspace = true }

# Template rendering for MappingValue::Template
minijinja = "2.5"

# URL encoding for query parameters
urlencoding = "2"

# Tracing for structured logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# OpenTelemetry (optional - enabled via telemetry feature)
opentelemetry = { version = "0.28", features = ["trace", "logs"], optional = true }
opentelemetry_sdk = { version = "0.28", features = ["rt-tokio", "trace", "logs"], optional = true }
opentelemetry-otlp = { version = "0.28", features = ["grpc-tonic", "trace", "logs"], optional = true }
tracing-opentelemetry = { version = "0.29", optional = true }
opentelemetry-appender-tracing = { version = "0.28", optional = true }
