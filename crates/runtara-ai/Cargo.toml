[package]
name = "runtara-ai"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "AI/LLM integration for runtara workflows — synchronous, ureq-based"
keywords = ["durable", "workflow", "ai", "llm", "agents"]
categories = ["development-tools"]

[features]
default = ["tracing"]

# Structured logging via the tracing ecosystem. Off for wasm workflow
# builds that re-export runtara-ai via runtara-workflow-stdlib — those
# builds have no subscriber and shouldn't carry tracing in the .wasm.
tracing = ["dep:tracing"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
tracing = { version = "0.1", optional = true }
# DSL constants only (DEFAULT_STEP_TIMEOUT_MS). default-features = false keeps
# schemars out of the wasm re-export via runtara-workflow-stdlib.
runtara-dsl = { path = "../runtara-dsl", default-features = false }

# Backend selected per target so wasm workflows (which re-export runtara-ai
# via runtara-workflow-stdlib) don't drag ureq + rustls + ring + url + icu_*
# into their .wasm. Same pattern as the per-agent crates.
[target.'cfg(not(target_family = "wasm"))'.dependencies]
runtara-http = { workspace = true, default-features = false, features = ["native"] }

[target.'cfg(target_family = "wasm")'.dependencies]
runtara-http = { workspace = true, default-features = false, features = ["wasi"] }
