[package]
name = "runtara-core"
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true
description = "Core execution engine for runtara - manages instances, checkpoints, signals, and durable sleep"
keywords = ["durable", "workflow", "execution", "checkpoint"]
categories = ["asynchronous", "development-tools"]

[lib]
name = "runtara_core"
path = "src/lib.rs"

[[bin]]
name = "runtara-core"
path = "src/main.rs"
required-features = ["server"]

[features]
default = ["server"]

# Full server mode with HTTP transport (for running runtara-core as a service)
server = ["dep:dotenvy", "dep:axum"]

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls-ring-webpki", "postgres", "sqlite", "uuid", "chrono", "macros", "migrate"] }


# Configuration (optional, for server mode)
dotenvy = { version = "0.15", optional = true }

# HTTP server (optional, for server mode)
axum = { version = "0.8", optional = true }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"

# Error handling
thiserror = "2"
anyhow = "1"

# Logging/tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"

# Async trait
async-trait = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["test-util", "macros", "rt-multi-thread"] }
tempfile = "3"
runtara-dsl = { path = "../runtara-dsl", version = "1.6" }
# Testcontainers for automatic PostgreSQL setup in tests
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }
