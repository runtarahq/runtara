# nginx reference config for RUNTARA AUTH_PROVIDER=trust_proxy.
#
# Replaces in-process auth by (1) validating the caller's JWT with the stock
# auth_jwt module, (2) stripping every client-supplied auth header, and (3)
# forwarding the validated sub to RUNTARA on 127.0.0.1. Adjust the IdP-specific
# fields (marked CHANGE ME) before deploying.

# Preload JWKS from your IdP. Requires nginx built with --with-http_auth_jwt_module
# (nginx Plus) or a free alternative such as lua-resty-openidc.
auth_jwt_key_request /_jwks_uri;

server {
    listen 443 ssl http2;
    server_name runtara.example.com;  # CHANGE ME

    ssl_certificate     /etc/ssl/runtara/fullchain.pem;  # CHANGE ME
    ssl_certificate_key /etc/ssl/runtara/privkey.pem;    # CHANGE ME

    # --- Auth --------------------------------------------------------------
    auth_jwt               "RUNTARA" token=$http_authorization;
    auth_jwt_type          signed;
    auth_jwt_require       $jwt_claim_sub error=401;
    # Narrow by issuer and audience — REQUIRED, do not leave as wildcards.
    auth_jwt_validate_exp  on;
    # CHANGE ME: expected issuer and audience
    # map $jwt_claim_iss $iss_ok { "https://idp.example.com/" 1; default 0; }
    # if ($iss_ok != 1) { return 401; }

    # --- Header hygiene ----------------------------------------------------
    # CRITICAL: strip every auth header the client may have sent. We set our
    # own values below; anything leaking through would let a client forge an
    # identity to RUNTARA.
    proxy_set_header Authorization       "";
    proxy_set_header X-Forwarded-User    "";
    proxy_set_header X-Forwarded-Email   "";
    proxy_set_header X-Forwarded-Groups  "";
    proxy_set_header X-User              "";
    proxy_set_header X-User-Id           "";

    # --- Forward validated identity ---------------------------------------
    proxy_set_header X-Forwarded-User  $jwt_claim_sub;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Host              $host;

    # --- Upstream ---------------------------------------------------------
    location / {
        proxy_pass          http://127.0.0.1:7001;
        proxy_http_version  1.1;
        proxy_read_timeout  3600s;
        proxy_buffering     off;
    }
}

# Internal location that nginx uses to fetch the JWKS. Cached in-memory by
# auth_jwt_key_request.
server {
    listen 127.0.0.1:7801;
    location = /_jwks_uri {
        internal;
        proxy_pass https://idp.example.com/.well-known/jwks.json;  # CHANGE ME
    }
}
