# Runtara — single-command evaluation stack.
#
#   docker compose up
#   open http://localhost:3000/ui
#
# Brings up the published Runtara server image plus the PostgreSQL and Valkey
# it needs, wired for password-free **local auth** so evaluators land straight
# in the UI with no identity provider to configure. This is a turnkey trial
# stack, NOT a production deployment — local auth has no authentication.
#
# Self-contained: everything (including DB bootstrap) lives in this one file,
# so it can be downloaded and run on its own without cloning the repo.
#
# Host port defaults to 3000; override if it's taken:
#   RUNTARA_PORT=3030 docker compose up
# Until the first tagged release publishes :latest, point at the rolling dev
# image:  RUNTARA_IMAGE_TAG=dev docker compose up

services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: runtara
      POSTGRES_PASSWORD: runtara
      # Core/environment DB. The two application DBs (server, objects) are
      # created by the init script below.
      POSTGRES_DB: runtara
    configs:
      - source: pg-init
        target: /docker-entrypoint-initdb.d/10-runtara-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runtara -d runtara"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      # Postgres 18+ stores data under a major-version subdir
      # (/var/lib/postgresql/<major>/docker); mount the parent so the volume
      # covers the active subdir. See docker-library/postgres#1259.
      - postgres_data:/var/lib/postgresql

  valkey:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - valkey_data:/data

  runtara:
    image: ghcr.io/runtarahq/runtara:${RUNTARA_IMAGE_TAG:-latest}
    # :latest / :dev are mutable rolling tags. Without this, `docker compose up`
    # reuses whatever image is cached locally and never re-checks the registry.
    # `always` makes each `up` pull the newest published image (downloads layers
    # only when they actually changed).
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      # Password-free local auth. The SPA reads authMode from the server at
      # runtime (window.__RUNTARA_CONFIG__), so no rebuild is needed.
      AUTH_PROVIDER: local
      # Local/trust-proxy auth refuse to bind a non-loopback address (an
      # unauthenticated listener must not be exposed directly). So the server
      # binds loopback and the `proxy` sidecar below fronts it. Overrides the
      # image's default SERVER_HOST=0.0.0.0.
      SERVER_HOST: 127.0.0.1
      # Match the published host port so the server's ready-banner link is
      # correct. Drives the in-image healthcheck (curls 127.0.0.1:$SERVER_PORT).
      SERVER_PORT: "${RUNTARA_PORT:-3000}"
      TENANT_ID: evaluation
      # Single-tenant: stop the SPA from prefixing API calls with an org id.
      RUNTARA_UI_STRIP_ORG_ID: "true"
      # No OTLP collector in this stack — silence the exporter.
      OTEL_SDK_DISABLED: "true"
      RUNTARA_SERVER_DATABASE_URL: postgres://runtara:runtara@postgres/runtara_server
      RUNTARA_DATABASE_URL: postgres://runtara:runtara@postgres/runtara
      OBJECT_MODEL_DATABASE_URL: postgres://runtara:runtara@postgres/runtara_objects
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
    # Publish the *proxy's* listen port (8080). Ports must be declared on the
    # network-namespace owner, which the sidecar joins via network_mode below.
    ports:
      - "${RUNTARA_PORT:-3000}:8080"
    volumes:
      - runtara_data:/data

  # Minimal TCP front for the loopback-bound server. Shares the runtara
  # container's network namespace so 127.0.0.1:$SERVER_PORT reaches the server,
  # and accepts host traffic on :8080 (published above as the host port).
  proxy:
    image: alpine/socat
    depends_on:
      runtara:
        condition: service_healthy
    network_mode: "service:runtara"
    command: ["TCP-LISTEN:8080,fork,reuseaddr", "TCP:127.0.0.1:${RUNTARA_PORT:-3000}"]

  # Optional one-shot example seeder. Runs ONLY when FETCH_EXAMPLES=yes;
  # otherwise it starts, prints a notice, and exits 0. When enabled it fetches
  # seed.py + the example workflows from GitHub (examples/ at $EXAMPLES_REF) and
  # installs them (create -> compile -> set-current). Shares the runtara network
  # namespace so it can reach the loopback-bound server at 127.0.0.1:$SERVER_PORT
  # (same reason as the proxy), while still having outbound internet for GitHub.
  #
  #   FETCH_EXAMPLES=yes docker compose up
  seeder:
    image: python:3-alpine
    depends_on:
      runtara:
        condition: service_healthy
    network_mode: "service:runtara"
    restart: "no"
    environment:
      FETCH_EXAMPLES: "${FETCH_EXAMPLES:-no}"
      EXAMPLES_REF: "${EXAMPLES_REF:-main}"
      SERVER_PORT: "${RUNTARA_PORT:-3000}"
    command:
      - sh
      - -c
      - |
        if [ "$$FETCH_EXAMPLES" != "yes" ]; then
          echo "seeder: FETCH_EXAMPLES != yes — skipping example seeding."
          exit 0
        fi
        base="https://raw.githubusercontent.com/runtarahq/runtara/$$EXAMPLES_REF/examples"
        echo "seeder: fetching seed.py from $$base"
        wget -qO /tmp/seed.py "$$base/seed.py" || { echo "seeder: failed to fetch seed.py"; exit 1; }
        RUNTARA_API_BASE="http://127.0.0.1:$$SERVER_PORT" EXAMPLES_BASE_URL="$$base" python3 /tmp/seed.py

configs:
  pg-init:
    content: |
      CREATE DATABASE runtara_server OWNER runtara;
      CREATE DATABASE runtara_objects OWNER runtara;

      -- The server and object-model stores use pg_trgm / pgvector /
      -- fuzzystrmatch. The pgvector image ships these but does not install
      -- them per-database, and the runtime no longer auto-creates them.
      \c runtara_server
      CREATE EXTENSION IF NOT EXISTS "pg_trgm";
      CREATE EXTENSION IF NOT EXISTS "vector";
      CREATE EXTENSION IF NOT EXISTS "fuzzystrmatch";

      \c runtara_objects
      CREATE EXTENSION IF NOT EXISTS "pg_trgm";
      CREATE EXTENSION IF NOT EXISTS "vector";
      CREATE EXTENSION IF NOT EXISTS "fuzzystrmatch";

volumes:
  postgres_data:
  valkey_data:
  runtara_data:
