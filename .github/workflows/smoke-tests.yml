name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to test against"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

  schedule:
    - cron: "0 6 * * *"

  push:
    branches:
      - main

env:
  VITE_RUNTARA_API_BASE_URL: ${{ vars.VITE_RUNTARA_API_BASE_URL }}
  VITE_RUNTARA_AUTH_MODE: local
  VITE_RUNTARA_TENANT_ID: ${{ vars.VITE_RUNTARA_TENANT_ID || 'Organity' }}
  VITE_STRIP_ORG_ID: "true"
  E2E_SMOKE_AUTH_MODE: local

jobs:
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: crates/runtara-server/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: crates/runtara-server/frontend/.node-version
          cache: npm
          cache-dependency-path: crates/runtara-server/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview -- --port 8081 &
          npx wait-on http://localhost:8081 --timeout 60000

      - name: Run smoke tests
        run: npm run test:e2e:smoke
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8081
          CI: "true"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: |
            crates/runtara-server/frontend/e2e-results/
            crates/runtara-server/frontend/e2e-report/
          retention-days: 7

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report
          path: crates/runtara-server/frontend/e2e-report/
          retention-days: 30
