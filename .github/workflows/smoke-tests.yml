name: Smoke Tests

on:
  workflow_dispatch:

  schedule:
    - cron: "0 6 * * *"

  push:
    branches:
      - main

jobs:
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMOKE_API_BASE_URL: http://127.0.0.1:7001
      VITE_RUNTARA_API_BASE_URL: http://127.0.0.1:7001
      VITE_RUNTARA_AUTH_MODE: local
      VITE_RUNTARA_TENANT_ID: Organity
      VITE_STRIP_ORG_ID: "true"
      E2E_SMOKE_AUTH_MODE: local
      DATABASE_URL: postgresql://smo_worker:GueUkDKea0CjKP4Rn5Bk0FDV@127.0.0.1:5432/smo_object_model
      OBJECT_MODEL_DATABASE_URL: postgresql://smo_worker:GueUkDKea0CjKP4Rn5Bk0FDV@127.0.0.1:5432/smo_object_model
      RUNTARA_DATABASE_URL: postgresql://smo_worker:GueUkDKea0CjKP4Rn5Bk0FDV@127.0.0.1:5432/runtara
      AUTH_PROVIDER: local
      TENANT_ID: Organity
      SERVER_HOST: 127.0.0.1
      SERVER_PORT: "7001"
      INTERNAL_PORT: "7002"
      VALKEY_HOST: 127.0.0.1
      VALKEY_PORT: "6379"
      DATA_DIR: ${{ github.workspace }}/.data/smoke
      RUNTARA_DEV_MODE: "true"
      RUNTARA_SDK_BACKEND: http
      RUNTARA_COMPILE_TARGET: wasm32-wasip2
      RUNTARA_UI_STRIP_ORG_ID: "true"
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:8081,http://localhost:8081
      CARGO_TERM_COLOR: always
      SQLX_OFFLINE: "true"
      RUST_LOG: info
      OTEL_SDK_DISABLED: "true"

    defaults:
      run:
        working-directory: crates/runtara-server/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-workspaces: ". -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: crates/runtara-server/frontend/.node-version
          cache: npm
          cache-dependency-path: crates/runtara-server/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build

      - name: Build backend
        working-directory: .
        run: cargo build -p runtara-server --locked

      - name: Start local dependencies
        working-directory: .
        run: |
          docker compose -f dev/docker-compose.yml up -d postgres valkey

          for _ in {1..60}; do
            postgres_status="$(docker inspect --format='{{.State.Health.Status}}' runtara-dev-postgres 2>/dev/null || true)"
            valkey_status="$(docker inspect --format='{{.State.Health.Status}}' runtara-dev-valkey 2>/dev/null || true)"

            if [ "$postgres_status" = "healthy" ] && [ "$valkey_status" = "healthy" ]; then
              exit 0
            fi

            sleep 2
          done

          docker compose -f dev/docker-compose.yml ps
          docker compose -f dev/docker-compose.yml logs postgres valkey
          exit 1

      - name: Start local backend
        working-directory: .
        run: |
          mkdir -p "$DATA_DIR"
          ./target/debug/runtara-server > "$DATA_DIR/runtara-server.log" 2>&1 &
          echo "$!" > "$DATA_DIR/runtara-server.pid"

          for _ in {1..90}; do
            if curl -fsS "${SMOKE_API_BASE_URL}/health" >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          tail -200 "$DATA_DIR/runtara-server.log"
          exit 1

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 8081 &
          npx wait-on http://127.0.0.1:8081 --timeout 60000

      - name: Run smoke tests
        run: npm run test:e2e:smoke -- --max-failures=5
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8081
          CI: "true"

      - name: Stop local stack
        if: always()
        working-directory: .
        run: |
          if [ -f "$DATA_DIR/runtara-server.pid" ]; then
            pid="$(cat "$DATA_DIR/runtara-server.pid")"
            kill "$pid" 2>/dev/null || true

            for _ in {1..15}; do
              if ! kill -0 "$pid" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            kill -9 "$pid" 2>/dev/null || true
          fi
          docker compose -f dev/docker-compose.yml down -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: |
            crates/runtara-server/frontend/e2e-results/
            crates/runtara-server/frontend/e2e-report/
            .data/smoke/runtara-server.log
          retention-days: 7

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report
          path: crates/runtara-server/frontend/e2e-report/
          retention-days: 30
