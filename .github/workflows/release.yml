name: Release

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"
            - "v[0-9]+.[0-9]+.[0-9]+-*"
        branches:
            - main

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1
    SQLX_OFFLINE: true

jobs:
    bundle:
        name: Build Bundle (${{ matrix.os }}-${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { target: x86_64-unknown-linux-gnu, runner: ubuntu-22.04, os: linux, arch: x86_64 }
                    - { target: aarch64-unknown-linux-gnu, runner: ubuntu-22.04-arm, os: linux, arch: aarch64 }
                    - { target: aarch64-apple-darwin, runner: macos-14, os: darwin, arch: aarch64 }

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Determine version
              id: get_version
              run: |
                  if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
                      echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
                  else
                      echo "version=dev" >> $GITHUB_OUTPUT
                  fi

            - name: Setup Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1

            - name: Build bundle
              run: ./scripts/build-bundle.sh --output-dir target/bundle

            - name: Upload bundle artifact
              uses: actions/upload-artifact@v4
              with:
                  name: bundle-${{ matrix.os }}-${{ matrix.arch }}
                  path: |
                      target/bundle/runtara-*.tar.gz
                      target/bundle/runtara-*.tar.gz.sha256

    release:
        name: Create Release
        runs-on: ubuntu-latest
        needs: bundle

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Determine version and tag
              id: get_version
              run: |
                  if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
                      echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
                      echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
                      echo "is_dev=false" >> $GITHUB_OUTPUT
                  else
                      echo "version=dev" >> $GITHUB_OUTPUT
                      echo "tag=dev" >> $GITHUB_OUTPUT
                      echo "is_dev=true" >> $GITHUB_OUTPUT
                  fi

            - name: Download all bundle artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true

            - name: List artifacts
              run: ls -lh artifacts/

            - name: Generate SHA256SUMS
              working-directory: artifacts
              run: |
                  sha256sum runtara-*.tar.gz > SHA256SUMS
                  cat SHA256SUMS

            - name: Delete existing dev release
              if: steps.get_version.outputs.is_dev == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release delete dev --yes --cleanup-tag 2>/dev/null || true

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION: ${{ steps.get_version.outputs.version }}
                  TAG: ${{ steps.get_version.outputs.tag }}
                  IS_DEV: ${{ steps.get_version.outputs.is_dev }}
                  COMMIT_SHA: ${{ github.sha }}
              run: |
                  FLAGS=""
                  if [[ "$IS_DEV" == "true" ]]; then
                      FLAGS="--prerelease --target $COMMIT_SHA"
                      TITLE="Development Snapshot (${VERSION})"
                      NOTES="Automated development build from main at ${COMMIT_SHA}.

                  > **This is a rolling release** — it is replaced on every push to main.
                  > For stable releases, use a tagged version.

                  Install: \`curl -fsSL https://install.runtara.com | sh -s -- --version ${VERSION}\`"
                  else
                      TITLE="Release ${VERSION}"
                      NOTES=""
                      if [[ "$TAG" == *-* ]]; then
                          FLAGS="--prerelease"
                      fi
                  fi

                  gh release create "$TAG" \
                      --title "$TITLE" \
                      $FLAGS \
                      ${NOTES:+--notes "$NOTES"} \
                      artifacts/runtara-*.tar.gz \
                      artifacts/runtara-*.tar.gz.sha256 \
                      artifacts/SHA256SUMS \
                      scripts/install.sh
