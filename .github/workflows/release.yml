name: Release

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"
            - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1
    SQLX_OFFLINE: true

jobs:
    bundle:
        name: Build Bundle (${{ matrix.os }}-${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { target: x86_64-unknown-linux-gnu, runner: ubuntu-22.04, os: linux, arch: x86_64 }
                    - { target: aarch64-unknown-linux-gnu, runner: ubuntu-22.04-arm, os: linux, arch: aarch64 }
                    - { target: aarch64-apple-darwin, runner: macos-14, os: darwin, arch: aarch64 }

        steps:
            - name: Get version from tag
              id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1

            - name: Build bundle
              run: ./scripts/build-bundle.sh --output-dir target/bundle

            - name: Upload bundle artifact
              uses: actions/upload-artifact@v4
              with:
                  name: bundle-${{ matrix.os }}-${{ matrix.arch }}
                  path: |
                      target/bundle/runtara-*.tar.gz
                      target/bundle/runtara-*.tar.gz.sha256

    release:
        name: Create Release
        runs-on: ubuntu-latest
        needs: bundle

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Get version from tag
              id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Download all bundle artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true

            - name: List artifacts
              run: ls -lh artifacts/

            - name: Generate SHA256SUMS
              working-directory: artifacts
              run: |
                  sha256sum runtara-*.tar.gz > SHA256SUMS
                  cat SHA256SUMS

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION: ${{ steps.get_version.outputs.version }}
                  TAG: ${{ github.ref_name }}
              run: |
                  PRERELEASE_FLAG=""
                  if [[ "$TAG" == *-* ]]; then
                      PRERELEASE_FLAG="--prerelease"
                  fi

                  gh release create "$TAG" \
                      --title "Release $VERSION" \
                      $PRERELEASE_FLAG \
                      artifacts/runtara-*.tar.gz \
                      artifacts/runtara-*.tar.gz.sha256 \
                      artifacts/SHA256SUMS \
                      scripts/install.sh
