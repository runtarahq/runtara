name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - '.github/**'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: true

jobs:
  bundle:
    name: Build Bundle (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              target: x86_64-unknown-linux-gnu,
              runner: ubuntu-22.04,
              os: linux,
              arch: x86_64,
            }
          - {
              target: aarch64-unknown-linux-gnu,
              runner: ubuntu-22.04-arm,
              os: linux,
              arch: aarch64,
            }
          - {
              target: aarch64-apple-darwin,
              runner: macos-14,
              os: darwin,
              arch: aarch64,
            }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: get_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
              echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: crates/runtara-server/frontend/.node-version
          cache: npm
          cache-dependency-path: crates/runtara-server/frontend/package-lock.json

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      # build-bundle.sh installs cargo-component (~5 min cold, used to build
      # the agent/shared components) and downloads wasmtime into this directory
      # keyed by version. Cache it so re-runs of the release matrix amortize the
      # install. Cache key includes pinned versions so any version bump invalidates.
      - name: Cache bundle build dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/runtara-bundle-build
          key: bundle-build-deps-${{ runner.os }}-${{ runner.arch }}-cargo-component-0.21.1-wasmtime-43.0.0-locked

      - name: Build bundle
        run: ./scripts/build-bundle.sh --output-dir target/bundle --version "${{ steps.get_version.outputs.version }}"

      # The bundle's compile-pipeline gate has moved to the components-mode
      # path: scripts/build-bundle.sh now invokes scripts/build-agent-components.sh
      # which drives `cargo component build` and emits the sidecar
      # meta.json for all 24 agent crates. Any breakage there fails the
      # bundle build itself before this step would run. The downstream
      # `smoke:` job extracts the resulting tarball and runs the full
      # server end-to-end (with RUNTARA_AGENT_COMPONENTS_DIR and
      # RUNTARA_COMPILE_SOURCE_DIR pointing into the bundled tarball) —
      # which exercises the actual server compile path against the
      # bundled compile-src tree.

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            target/bundle/runtara-*.tar.gz
            target/bundle/runtara-*.tar.gz.sha256

  smoke:
    name: Smoke Bundle
    runs-on: ubuntu-latest
    needs: bundle
    timeout-minutes: 20
    env:
      SMOKE_API_BASE_URL: http://127.0.0.1:7001
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:7001
      E2E_UI_BASE_PATH: /ui
      E2E_SMOKE_AUTH_MODE: local
      RUNTARA_SERVER_DATABASE_URL: postgresql://smo_worker:GueUkDKea0CjKP4Rn5Bk0FDV@127.0.0.1:5432/smo_object_model
      OBJECT_MODEL_DATABASE_URL: postgresql://smo_worker:GueUkDKea0CjKP4Rn5Bk0FDV@127.0.0.1:5432/smo_object_model
      RUNTARA_DATABASE_URL: postgresql://smo_worker:GueUkDKea0CjKP4Rn5Bk0FDV@127.0.0.1:5432/runtara
      AUTH_PROVIDER: local
      TENANT_ID: Organity
      SERVER_HOST: 127.0.0.1
      SERVER_PORT: "7001"
      INTERNAL_PORT: "7002"
      VALKEY_HOST: 127.0.0.1
      VALKEY_PORT: "6379"
      DATA_DIR: ${{ github.workspace }}/.data/smoke
      RUNTARA_DEV_MODE: "true"
      RUNTARA_SDK_BACKEND: http
      RUNTARA_COMPILE_TARGET: wasm32-wasip2
      RUNTARA_UI_STRIP_ORG_ID: "true"
      RUST_LOG: info
      OTEL_SDK_DISABLED: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: crates/runtara-server/frontend/.node-version
          cache: npm
          cache-dependency-path: crates/runtara-server/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: crates/runtara-server/frontend
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: crates/runtara-server/frontend
        run: npx playwright install chromium --with-deps

      - name: Download linux bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-linux-x86_64
          path: target/smoke-bundle

      - name: Extract linux bundle
        run: |
          mkdir -p target/smoke-bundle/extracted
          tarball="$(find target/smoke-bundle -maxdepth 1 -name 'runtara-*-x86_64-linux.tar.gz' | head -n 1)"
          if [ -z "$tarball" ]; then
              echo "::error::Linux x86_64 bundle artifact not found"
              exit 1
          fi

          tar -xzf "$tarball" -C target/smoke-bundle/extracted
          bundle_dir="$(find target/smoke-bundle/extracted -maxdepth 1 -type d -name 'runtara-*' | head -n 1)"
          if [ -z "$bundle_dir" ]; then
              echo "::error::Extracted bundle directory not found"
              exit 1
          fi

          echo "RUNTARA_BUNDLE_DIR=${bundle_dir}" >> "$GITHUB_ENV"
          echo "RUNTARA_SERVER_BIN=${bundle_dir}/bin/runtara-server" >> "$GITHUB_ENV"

      - name: Start local dependencies
        run: |
          docker compose -f dev/docker-compose.yml up -d postgres valkey

          for _ in {1..60}; do
              postgres_status="$(docker inspect --format='{{.State.Health.Status}}' runtara-dev-postgres 2>/dev/null || true)"
              valkey_status="$(docker inspect --format='{{.State.Health.Status}}' runtara-dev-valkey 2>/dev/null || true)"

              if [ "$postgres_status" = "healthy" ] && [ "$valkey_status" = "healthy" ]; then
                  exit 0
              fi

              sleep 2
          done

          docker compose -f dev/docker-compose.yml ps
          docker compose -f dev/docker-compose.yml logs postgres valkey
          exit 1

      - name: Start release backend
        run: |
          mkdir -p "$DATA_DIR"
          export PATH="${RUNTARA_BUNDLE_DIR}/bin:${PATH}"
          export WASMTIME_PATH="${RUNTARA_BUNDLE_DIR}/bin/wasmtime"
          # Without this the dispatcher silently falls through to the
          # static-registry path and the smoke test never exercises the
          # bundled .wasm + .meta.json pairs.
          export RUNTARA_AGENT_COMPONENTS_DIR="${RUNTARA_BUNDLE_DIR}/agents"

          "$RUNTARA_SERVER_BIN" > "$DATA_DIR/runtara-server.log" 2>&1 &
          echo "$!" > "$DATA_DIR/runtara-server.pid"

          for _ in {1..90}; do
              if curl -fsS "${SMOKE_API_BASE_URL}/health" >/dev/null; then
                  exit 0
              fi
              sleep 2
          done

          tail -200 "$DATA_DIR/runtara-server.log"
          exit 1

      - name: Run smoke tests
        working-directory: crates/runtara-server/frontend
        run: npm run test:e2e:smoke -- --max-failures=5
        env:
          CI: "true"

      - name: Stop local stack
        if: always()
        run: |
          if [ -f "$DATA_DIR/runtara-server.pid" ]; then
              pid="$(cat "$DATA_DIR/runtara-server.pid")"
              kill "$pid" 2>/dev/null || true

              for _ in {1..15}; do
                  if ! kill -0 "$pid" 2>/dev/null; then
                      break
                  fi
                  sleep 1
              done

              kill -9 "$pid" 2>/dev/null || true
          fi
          docker compose -f dev/docker-compose.yml down -v

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: |
            crates/runtara-server/frontend/e2e-results/
            crates/runtara-server/frontend/e2e-report/
            .data/smoke/runtara-server.log
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version and tag
        id: get_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              {
                  echo "version=${GITHUB_REF#refs/tags/v}"
                  echo "tag=${GITHUB_REF_NAME}"
                  echo "is_dev=false"
              } >> "$GITHUB_OUTPUT"
          else
              {
                  echo "version=dev"
                  echo "tag=dev"
                  echo "is_dev=true"
              } >> "$GITHUB_OUTPUT"
          fi

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          sha256sum runtara-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Delete existing dev release
        if: steps.get_version.outputs.is_dev == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release
        timeout-minutes: 10
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.get_version.outputs.version }}
          TAG: ${{ steps.get_version.outputs.tag }}
          IS_DEV: ${{ steps.get_version.outputs.is_dev }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          FLAGS=()
          NOTES_ARGS=()
          if [[ "$IS_DEV" == "true" ]]; then
              FLAGS=(--prerelease --target "$COMMIT_SHA")
              TITLE="Development Snapshot (${VERSION})"
              NOTES="Automated development build from main at ${COMMIT_SHA}.

          > **This is a rolling release** — it is replaced on every push to main.
          > For stable releases, use a tagged version.

          Install: \`curl -fsSL https://install.runtara.com | sh -s -- --version ${VERSION}\`"
          else
              TITLE="Release ${VERSION}"
              NOTES=""
              if [[ "$TAG" == *-* ]]; then
                  FLAGS=(--prerelease)
              fi
          fi

          if [[ -n "$NOTES" ]]; then
              NOTES_ARGS=(--notes "$NOTES")
          fi

          ASSETS=(
              artifacts/runtara-*.tar.gz
              artifacts/runtara-*.tar.gz.sha256
              artifacts/SHA256SUMS
              scripts/install.sh
          )

          gh release create "$TAG" \
              --title "$TITLE" \
              "${FLAGS[@]}" \
              "${NOTES_ARGS[@]}" \
              "${ASSETS[@]}"

      - name: Notify Slack — release published
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.get_version.outputs.tag }}
          IS_DEV: ${{ steps.get_version.outputs.is_dev }}
          ACTOR: ${{ github.actor }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.tag }}
          RUN_NUM: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$IS_DEV" == "true" || "$TAG" == *-* ]]; then
              emoji=":package:"
              kind="Pre-release"
          else
              emoji=":rocket:"
              kind="Release"
          fi

          payload=$(jq -nc \
            --arg emoji "$emoji" \
            --arg kind "$kind" \
            --arg repo "$REPO" \
            --arg tag "$TAG" \
            --arg actor "$ACTOR" \
            --arg release_url "$RELEASE_URL" \
            --arg run_num "$RUN_NUM" \
            --arg run_url "$RUN_URL" \
            '{text: "\($emoji) \($kind) <\($release_url)|\($tag)> published for \($repo) by \($actor) (<\($run_url)|run #\($run_num)>)"}')
          curl -sS --fail-with-body -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$SLACK_WEBHOOK_URL"

  # ── Docker image ────────────────────────────────────────────────────────────
  #
  # Repackages the already-built, smoke-tested linux bundles into an OCI image
  # published to ghcr.io/<owner>/runtara. Each arch is built natively (the
  # bundle embeds arch-specific wasmtime + prebuilt WASM components), pushed
  # by digest, then merged into one multi-arch manifest by `docker-merge`.
  docker:
    name: Build Docker Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, platform: linux/amd64, runner: ubuntu-22.04 }
          - { arch: aarch64, platform: linux/arm64, runner: ubuntu-22.04-arm }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ${{ matrix.arch }} bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-linux-${{ matrix.arch }}
          path: docker/bundle

      - name: Stage bundle into build context
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          tarball="$(find docker/bundle -maxdepth 1 -name "runtara-*-${ARCH}-linux.tar.gz" | head -n 1)"
          if [ -z "$tarball" ]; then
              echo "::error::bundle tarball not found for ${ARCH}"
              exit 1
          fi
          mkdir -p docker/runtara
          # --strip-components=1 drops the versioned top-level dir so the
          # Dockerfile's `COPY runtara/` lands the bundle root directly.
          tar -xzf "$tarball" --strip-components=1 -C docker/runtara

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          # Attestation manifests confuse the digest-merge step below.
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Merge Docker Manifest
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Tag rules mirror the GitHub Release / bundle behaviour:
      #   tag v1.2.3      -> :1.2.3 + :latest
      #   tag v1.2.3-rc1  -> :1.2.3-rc1   (latest=auto skips prereleases)
      #   push to main    -> :dev         (rolling snapshot)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=dev,enable={{is_default_branch}}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$TAGS_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect pushed image
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "${IMAGE}:${VERSION}"
