name: Release Bundle

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"
            - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1
    SQLX_OFFLINE: true

jobs:
    bundle:
        name: Build Bundle (${{ matrix.os }}-${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { target: x86_64-unknown-linux-gnu, runner: ubuntu-22.04, os: linux, arch: x86_64 }
                    - { target: aarch64-unknown-linux-gnu, runner: ubuntu-22.04-arm, os: linux, arch: aarch64 }
                    - { target: aarch64-apple-darwin, runner: macos-14, os: darwin, arch: aarch64 }

        steps:
            - name: Get version from tag
              id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              # rust-toolchain.toml in the repo root pins the version and wasm32-wasip2 target

            - name: Build bundle
              run: ./scripts/build-bundle.sh --output-dir target/bundle

            - name: Upload bundle artifact
              uses: actions/upload-artifact@v4
              with:
                  name: bundle-${{ matrix.os }}-${{ matrix.arch }}
                  path: |
                      target/bundle/runtara-*.tar.gz
                      target/bundle/runtara-*.tar.gz.sha256

    release:
        name: Create Release
        runs-on: ubuntu-latest
        needs: bundle

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Get version from tag
              id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Download all bundle artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true

            - name: List artifacts
              run: ls -lh artifacts/

            - name: Generate SHA256SUMS
              working-directory: artifacts
              run: |
                  sha256sum runtara-*.tar.gz > SHA256SUMS
                  cat SHA256SUMS

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION: ${{ steps.get_version.outputs.version }}
                  TAG: ${{ github.ref_name }}
              run: |
                  PRERELEASE_FLAG=""
                  if [[ "$TAG" == *-* ]]; then
                      PRERELEASE_FLAG="--prerelease"
                  fi

                  gh release create "$TAG" \
                      --title "Release $VERSION" \
                      $PRERELEASE_FLAG \
                      artifacts/runtara-*.tar.gz \
                      artifacts/runtara-*.tar.gz.sha256 \
                      artifacts/SHA256SUMS \
                      scripts/install.sh

    # ── Crates.io publishing (unchanged from existing release.yml) ──
    # These jobs publish the library crates to crates.io for Rust library consumers.
    # They are independent of the bundle and run in parallel.

    publish-dsl:
        name: Publish runtara-dsl
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: cargo publish -p runtara-dsl --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-agent-macro:
        name: Publish runtara-agent-macro
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: cargo publish -p runtara-agent-macro --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-http:
        name: Publish runtara-http
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: cargo publish -p runtara-http --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-sdk-macros:
        name: Publish runtara-sdk-macros
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: cargo publish -p runtara-sdk-macros --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-core:
        name: Publish runtara-core
        runs-on: ubuntu-latest
        needs: [publish-dsl]
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: sleep 30
            - run: cargo publish -p runtara-core --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-ai:
        name: Publish runtara-ai
        runs-on: ubuntu-latest
        needs: [publish-http]
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: sleep 30
            - run: cargo publish -p runtara-ai --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-agents:
        name: Publish runtara-agents
        runs-on: ubuntu-latest
        needs: [publish-dsl, publish-agent-macro, publish-http]
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: sleep 30
            - run: cargo publish -p runtara-agents --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-sdk:
        name: Publish runtara-sdk
        runs-on: ubuntu-latest
        needs: [publish-sdk-macros, publish-core, publish-http]
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: sleep 30
            - run: cargo publish -p runtara-sdk --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-workflows:
        name: Publish runtara-workflows
        runs-on: ubuntu-latest
        needs: [publish-dsl, publish-ai, publish-agents]
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: sleep 30
            - run: cargo publish -p runtara-workflows --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-workflow-stdlib:
        name: Publish runtara-workflow-stdlib
        runs-on: ubuntu-latest
        needs: [publish-agents, publish-sdk, publish-ai]
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: sleep 30
            - run: cargo publish -p runtara-workflow-stdlib --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-management-sdk:
        name: Publish runtara-management-sdk
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: sleep 30
            - run: cargo publish -p runtara-management-sdk --allow-dirty
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-environment:
        name: Publish runtara-environment
        runs-on: ubuntu-latest
        needs: [publish-core, publish-dsl]
        steps:
            - uses: actions/checkout@v4
            - id: get_version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - run: ./scripts/update-version.sh ${{ steps.get_version.outputs.version }}
            - run: sleep 30
            - run: cargo publish -p runtara-environment --allow-dirty --no-verify
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
