name: CI

on:
  push:
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  notify-start:
    # Only fire on push-to-main or PRs from this repo (not forks).
    # Forks can't read SLACK_WEBHOOK_URL anyway; this gate is belt-and-braces.
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack — build started
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_NUM: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -nc \
            --arg repo "$REPO" \
            --arg ref "$REF" \
            --arg actor "$ACTOR" \
            --arg run_num "$RUN_NUM" \
            --arg run_url "$RUN_URL" \
            '{text: ":hourglass_flowing_sand: CI started — \($repo) on `\($ref)` by \($actor) (<\($run_url)|run #\($run_num)>)"}')
          curl -sS --fail-with-body -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$SLACK_WEBHOOK_URL"

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-workspaces: ". -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: crates/runtara-server/frontend/.node-version
          cache: npm
          cache-dependency-path: crates/runtara-server/frontend/package-lock.json

      - name: Build frontend (embedded UI)
        working-directory: crates/runtara-server/frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --features runtara-server/embed-ui -- -D warnings

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-workspaces: ". -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: crates/runtara-server/frontend/.node-version
          cache: npm
          cache-dependency-path: crates/runtara-server/frontend/package-lock.json

      - name: Build frontend (embedded UI)
        working-directory: crates/runtara-server/frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Build
        run: cargo build --workspace --all-targets --features runtara-server/embed-ui

      - name: Save build cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

  test-sdk:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-sdk tests
        run: cargo test -p runtara-sdk

  test-workflows:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-workflows tests
        run: cargo test -p runtara-workflows

  # Per-construct compile smoke tests. Builds the WASM stdlib once, stages it,
  # then runs tests/smoke_compile.rs — each test takes a minimal workflow
  # exercising one DSL construct all the way through codegen + rustc to a
  # binary. Catches regressions where generated code is syntactically valid
  # but rustc rejects it (e.g. type mismatches).
  test-workflows-smoke-compile:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip2

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Build WASM stdlib
        run: |
          RUSTFLAGS="-C embed-bitcode=yes" \
            cargo build -p runtara-workflow-stdlib --release \
              --target wasm32-wasip2 --no-default-features
          cargo build -p runtara-workflow-stdlib --release

      - name: Stage native_cache_wasm
        run: |
          rm -rf target/native_cache_wasm
          mkdir -p target/native_cache_wasm/deps
          cp target/wasm32-wasip2/release/libruntara_workflow_stdlib.rlib \
             target/native_cache_wasm/
          cp target/wasm32-wasip2/release/deps/*.rlib target/native_cache_wasm/deps/
          find target/wasm32-wasip2/release/build -name "*.a" \
               -exec cp {} target/native_cache_wasm/deps/ \; 2>/dev/null || true
          cp target/release/deps/*.so target/native_cache_wasm/deps/ 2>/dev/null || true

      - name: Run per-construct smoke compile tests
        env:
          RUNTARA_RUN_SMOKE_COMPILE: "1"
          RUNTARA_LTO: "off"
          RUNTARA_WASM_LIBRARY_DIR: ${{ github.workspace }}/target/native_cache_wasm
        run: cargo test -p runtara-workflows --test smoke_compile --release -- --test-threads=1

  test-core:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runtara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-core tests
        env:
          TEST_RUNTARA_DATABASE_URL: postgres://postgres:postgres@localhost:5432/runtara_test
        run: cargo test -p runtara-core -- --test-threads=1

  test-server:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runtara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-server tests
        # TEST_RUNTARA_SERVER_DATABASE_URL opts the integration tests in
        # crates/runtara-server/tests/*.rs (e.g. invocation_cleanup_test.rs)
        # into running against a real Postgres. Without it, skip_if_no_db!()
        # makes them silently no-op — which previously hid the eager-pass
        # cleanup regression that motivated this setup.
        env:
          TEST_RUNTARA_SERVER_DATABASE_URL: postgres://postgres:postgres@localhost:5432/runtara_test
        run: cargo test -p runtara-server -- --test-threads=1

  test-environment:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runtara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-environment tests
        env:
          TEST_RUNTARA_DATABASE_URL: postgres://postgres:postgres@localhost:5432/runtara_test
        run: cargo test -p runtara-environment -- --test-threads=1

  notify-result:
    # Posts success or failure once all build/test jobs finish.
    # Skipped on cancellation (avoids spurious "failure" pings when a run is
    # superseded by a new push).
    needs:
      - lint
      - build
      - test-sdk
      - test-workflows
      - test-workflows-smoke-compile
      - test-core
      - test-server
      - test-environment
    if: |
      !cancelled() && (
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack — build result
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_NUM: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed=$(echo "$NEEDS_JSON" | jq -r 'to_entries | map(select(.value.result == "failure")) | map(.key) | join(", ")')
          if [ -z "$failed" ]; then
            emoji=":white_check_mark:"
            msg="CI passed"
          else
            emoji=":x:"
            msg="CI failed: $failed"
          fi
          payload=$(jq -nc \
            --arg emoji "$emoji" \
            --arg msg "$msg" \
            --arg repo "$REPO" \
            --arg ref "$REF" \
            --arg actor "$ACTOR" \
            --arg run_num "$RUN_NUM" \
            --arg run_url "$RUN_URL" \
            '{text: "\($emoji) \($msg) — \($repo) on `\($ref)` by \($actor) (<\($run_url)|run #\($run_num)>)"}')
          curl -sS --fail-with-body -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$SLACK_WEBHOOK_URL"
