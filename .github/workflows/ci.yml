name: CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
  pull_request:
    branches:
      - main

# Default-deny: every job reads source via actions/checkout. No job needs
# to write to issues, PRs, releases, packages, etc. Per-job overrides go
# at the job level if ever required.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  notify-start:
    # Only fire on push-to-main or PRs from this repo (not forks).
    # Forks can't read SLACK_WEBHOOK_URL anyway; this gate is belt-and-braces.
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack — build started
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_NUM: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -nc \
            --arg repo "$REPO" \
            --arg ref "$REF" \
            --arg actor "$ACTOR" \
            --arg run_num "$RUN_NUM" \
            --arg run_url "$RUN_URL" \
            '{text: ":hourglass_flowing_sand: CI started — \($repo) on `\($ref)` by \($actor) (<\($run_url)|run #\($run_num)>)"}')
          curl -sS --fail-with-body -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$SLACK_WEBHOOK_URL"

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-workspaces: ". -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: crates/runtara-server/frontend/.node-version
          cache: npm
          cache-dependency-path: crates/runtara-server/frontend/package-lock.json

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build frontend (embedded UI)
        working-directory: crates/runtara-server/frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --features runtara-server/embed-ui -- -D warnings

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-workspaces: ". -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: crates/runtara-server/frontend/.node-version
          cache: npm
          cache-dependency-path: crates/runtara-server/frontend/package-lock.json

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build frontend (embedded UI)
        working-directory: crates/runtara-server/frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Build
        run: cargo build --workspace --all-targets --features runtara-server/embed-ui

      - name: Save build cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

  test-sdk:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-sdk tests
        run: cargo test -p runtara-sdk

  test-workflows:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-workflows tests
        run: cargo test -p runtara-workflows

  test-core:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runtara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-core tests
        env:
          TEST_RUNTARA_DATABASE_URL: postgres://postgres:postgres@localhost:5432/runtara_test
        run: cargo test -p runtara-core -- --test-threads=1

  test-server:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runtara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-server tests
        # TEST_RUNTARA_SERVER_DATABASE_URL opts the Postgres-dependent
        # integration tests (e.g. invocation_cleanup_test.rs) into running
        # against a real DB. VALKEY_HOST does the same for the Redis
        # isolation regression tests (redis_isolation.rs, guarding the
        # BLPOP head-of-line fix from commit 8c43211). Both env-var
        # skip cleanly when unset, so a developer running `cargo test`
        # without infra sees no-ops, not failures.
        env:
          TEST_RUNTARA_SERVER_DATABASE_URL: postgres://postgres:postgres@localhost:5432/runtara_test
          VALKEY_HOST: localhost
          VALKEY_PORT: "6379"
        run: cargo test -p runtara-server -- --test-threads=1

  test-environment:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runtara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      - name: Run runtara-environment tests
        env:
          TEST_RUNTARA_DATABASE_URL: postgres://postgres:postgres@localhost:5432/runtara_test
        run: cargo test -p runtara-environment -- --test-threads=1

  # Per-component-crate unit tests for the 24 agent crates plus the legacy
  # `runtara-agents` parent and the shared agent infrastructure
  # (`runtara-agent-macro` proc-macro). Distinct from components-build,
  # which builds .wasm + .meta.json and drives the dispatcher end-to-end —
  # this job runs the native `cargo test` for each agent crate's logic
  # (regex, template, transform, sigv4, http response shaping, etc.).
  #
  # Iterates the workspace members so a newly-added agent crate is picked
  # up without a CI edit, as long as it lands under `crates/agents/`.
  test-agents:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.sha }}

      # Legacy parent: tests for utils, http auth extractors,
      # integration helpers that aren't owned by any single component
      # crate.
      - name: Run runtara-agents (legacy parent) tests
        run: cargo test -p runtara-agents --lib

      # Shared procedural macro that emits the &'static capability /
      # input / output metadata each component crate ships.
      - name: Run runtara-agent-macro tests
        run: cargo test -p runtara-agent-macro

      # Every component crate under crates/agents/. Looped rather than
      # listed so adding crates/agents/runtara-agent-foo/ doesn't
      # require touching CI. Tests run with -p so one failure doesn't
      # short-circuit the rest; loop fails the job on any non-zero.
      - name: Run all runtara-agent-* component crate tests
        run: |
          set -e
          for crate_dir in crates/agents/runtara-agent-*; do
            [ -d "$crate_dir" ] || continue
            name="$(basename "$crate_dir")"
            echo "==> $name"
            cargo test -p "$name" --lib
          done

  # WIT-only sanity: the canonical agent contract package parses and its
  # wasi:* dependency tree resolves. Cheap; catches deps.toml / lockfile drift
  # before any agent crate tries to consume it.
  wit-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install wit-deps
        run: cargo install wit-deps-cli --locked

      - name: Install wasm-tools
        run: cargo install wasm-tools --locked

      - name: Lock and resolve WIT dependencies
        working-directory: crates/runtara-agent-wit
        run: wit-deps lock

      - name: Validate WIT package
        run: wasm-tools component wit crates/runtara-agent-wit/wit > /dev/null

  # Build every runtara-agent-* crate as a WASM component, emit each agent's
  # macro-derived meta.json sidecar, and run the dispatcher integration tests
  # (including the full-bundle drift detector that calls every declared
  # capability against its real .wasm and asserts no UNKNOWN_CAPABILITY).
  components-build:
    runs-on: ubuntu-latest
    needs: wit-package

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip2
          cache: true
          cache-workspaces: ". -> target"

      # `cargo install cargo-component` is a ~5 min cold build. Cache the
      # installed binary keyed on the pinned version so subsequent CI runs
      # are sub-second. Version bumps invalidate the cache automatically.
      - name: Cache cargo-component binary
        id: cache-cargo-component
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-component
          key: cargo-component-${{ runner.os }}-${{ runner.arch }}-0.21.1

      # Intentionally NOT using --locked. cargo-component v0.21.1's own
      # Cargo.lock pins wit-parser v0.219.1, which has since been yanked
      # from crates.io. Letting cargo resolve from the Cargo.toml ranges
      # picks a non-yanked wit-parser. cargo-component itself stays
      # pinned via --version.
      - name: Install cargo-component
        if: steps.cache-cargo-component.outputs.cache-hit != 'true'
        run: cargo install cargo-component --version 0.21.1

      # wac compose is needed by the workflow-compile e2e tests
      # (RUNTARA_RUN_COMPONENTS_E2E=1). Upstream ships prebuilt static
      # binaries — bypass cargo install to keep this fast.
      - name: Cache wac binary
        id: cache-wac
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wac
          key: wac-${{ runner.os }}-${{ runner.arch }}-0.10.0

      - name: Install wac
        if: steps.cache-wac.outputs.cache-hit != 'true'
        env:
          RUNNER_ARCH_LOCAL: ${{ runner.arch }}
        run: |
          set -euo pipefail
          case "$RUNNER_ARCH_LOCAL" in
            X64) asset="wac-cli-x86_64-unknown-linux-musl" ;;
            ARM64) asset="wac-cli-aarch64-unknown-linux-musl" ;;
            *) echo "Unsupported runner arch: $RUNNER_ARCH_LOCAL" >&2; exit 1 ;;
          esac
          mkdir -p ~/.cargo/bin
          curl -fSL -o ~/.cargo/bin/wac \
            "https://github.com/bytecodealliance/wac/releases/download/v0.10.0/${asset}"
          chmod +x ~/.cargo/bin/wac
          wac --version

      # components_execute and direct_wasm_execute run the composed artifacts
      # through the same CLI used by bundled environments. Keep the version
      # aligned with scripts/build-bundle.sh.
      - name: Cache wasmtime binary
        id: cache-wasmtime
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasmtime
          key: wasmtime-${{ runner.os }}-${{ runner.arch }}-43.0.0

      - name: Install wasmtime
        if: steps.cache-wasmtime.outputs.cache-hit != 'true'
        env:
          RUNNER_ARCH_LOCAL: ${{ runner.arch }}
        run: |
          set -euo pipefail
          version="43.0.0"
          case "$RUNNER_ARCH_LOCAL" in
            X64) asset="wasmtime-v${version}-x86_64-linux" ;;
            ARM64) asset="wasmtime-v${version}-aarch64-linux" ;;
            *) echo "Unsupported runner arch: $RUNNER_ARCH_LOCAL" >&2; exit 1 ;;
          esac
          curl -fSL -o /tmp/wasmtime.tar.xz \
            "https://github.com/bytecodealliance/wasmtime/releases/download/v${version}/${asset}.tar.xz"
          tar -xJf /tmp/wasmtime.tar.xz -C /tmp
          mkdir -p ~/.cargo/bin
          cp "/tmp/${asset}/wasmtime" ~/.cargo/bin/wasmtime
          chmod +x ~/.cargo/bin/wasmtime

      - name: Verify wasmtime
        run: wasmtime --version

      - name: Install wit-deps
        run: cargo install wit-deps-cli --locked

      - name: Build all 24 agent components + emit sidecar meta.json
        env:
          # Tools are installed explicitly above. Fail loudly if anything's
          # missing instead of silently re-installing inside the script.
          RUNTARA_NO_INSTALL_TOOLS: "1"
        run: scripts/build-agent-components.sh

      - name: Verify 24 .wasm + 24 .meta.json present
        run: |
          wasm_count=$(find target/wasm32-wasip2/release -maxdepth 1 -name 'runtara_agent_*.wasm' | wc -l)
          meta_count=$(find target/wasm32-wasip2/release -maxdepth 1 -name 'runtara_agent_*.meta.json' | wc -l)
          echo "wasm=$wasm_count meta=$meta_count"
          test "$wasm_count" -eq 24
          test "$meta_count" -eq 24

      - name: Run dispatcher integration tests (incl. full-bundle drift detector)
        run: cargo test -p runtara-component-host --tests

      # End-to-end: drive `cargo component build` + `wac compose` against
      # real workflows that import the freshly-staged agent components,
      # then load and execute the composed .wasm. This is the gate that
      # catches drift between the per-agent WIT, the workflow logic crate,
      # and the wac composition graph — none of which the lower-level
      # tests cover.
      - name: Run components-mode workflow e2e tests
        env:
          RUNTARA_RUN_COMPONENTS_E2E: "1"
          RUNTARA_AGENT_COMPONENTS_DIR: ${{ github.workspace }}/target/wasm32-wasip2/release
        run: |
          cargo test -p runtara-workflows \
            --test components_smoke \
            --test components_e2e \
            --test components_execute \
            -- --test-threads=1

      # Direct A/B smoke: use the same staged stdlib/runtime/agent component
      # bundle, then compile direct workflow fixtures, statically compose
      # them, execute the final artifacts, and assert the fake SDK observed the
      # expected completion/failure/events for the supported feature classes.
      - name: Run direct WASM workflow execution smoke tests
        env:
          RUNTARA_RUN_DIRECT_WASM_E2E: "1"
          RUNTARA_AGENT_COMPONENTS_DIR: ${{ github.workspace }}/target/wasm32-wasip2/release
        run: |
          cargo test -p runtara-workflows \
            --test direct_wasm_ab_execute \
            --test direct_wasm_execute \
            -- --test-threads=1

  notify-result:
    # Posts success or failure once all build/test jobs finish.
    # Skipped on cancellation (avoids spurious "failure" pings when a run is
    # superseded by a new push).
    needs:
      - lint
      - build
      - test-sdk
      - test-workflows
      - test-core
      - test-server
      - test-environment
      - test-agents
      - wit-package
      - components-build
    if: |
      !cancelled() && (
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack — build result
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_NUM: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed=$(echo "$NEEDS_JSON" | jq -r 'to_entries | map(select(.value.result == "failure")) | map(.key) | join(", ")')
          if [ -z "$failed" ]; then
            emoji=":white_check_mark:"
            msg="CI passed"
          else
            emoji=":x:"
            msg="CI failed: $failed"
          fi
          payload=$(jq -nc \
            --arg emoji "$emoji" \
            --arg msg "$msg" \
            --arg repo "$REPO" \
            --arg ref "$REF" \
            --arg actor "$ACTOR" \
            --arg run_num "$RUN_NUM" \
            --arg run_url "$RUN_URL" \
            '{text: "\($emoji) \($msg) — \($repo) on `\($ref)` by \($actor) (<\($run_url)|run #\($run_num)>)"}')
          curl -sS --fail-with-body -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$SLACK_WEBHOOK_URL"
